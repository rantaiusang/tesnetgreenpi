<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tanam Pohon - GreenProof</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #10b981;
            --primary-dark: #047857;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --bg-body: #f8fafc;
            --surface: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            padding-bottom: 40px;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- HEADER --- */
        header {
            background: var(--surface);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        
        /* UPDATE: Style untuk tombol kembali agar terlihat seperti link */
        .back-btn {
            background: none; 
            border: none; 
            font-size: 1.2rem; 
            color: var(--text-main); 
            cursor: pointer; 
            padding: 5px;
            text-decoration: none; /* Hapus garis bawah */
            display: flex;
            align-items: center;
        }
        .back-btn:hover { color: var(--primary); }

        header h2 { font-size: 1.1rem; font-weight: 700; }

        /* --- CONTAINER --- */
        .container { max-width: 600px; margin: 24px auto; padding: 0 20px; }
        
        /* --- CARDS --- */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid #f1f5f9;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) backwards;
        }
        /* Update delay animations untuk 3 kartu */
        .card:nth-child(1) { animation-delay: 0s; }
        .card:nth-child(2) { animation-delay: 0.1s; }
        .card:nth-child(3) { animation-delay: 0.2s; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .card-icon { 
            width: 36px; height: 36px; border-radius: 10px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: white;
        }
        .card-title { font-size: 1rem; font-weight: 700; }
        
        .icon-plant { background: var(--primary); } /* Warna baru untuk detail tanaman */
        .icon-gps { background: var(--secondary); }
        .icon-camera { background: var(--accent); }

        /* --- FORM ELEMENTS --- */
        .input-group { margin-bottom: 16px; }
        .form-control {
            width: 100%; padding: 14px; border: 1px solid var(--border);
            border-radius: 12px; font-size: 0.95rem; background: #f8fafc;
            color: var(--text-muted); outline: none; transition: 0.3s;
        }
        .form-control:focus { background: white; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        .btn {
            border: none; padding: 14px 20px; border-radius: 12px;
            font-weight: 600; font-size: 1rem; cursor: pointer;
            transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--secondary); color: white; width: auto; }
        .btn-submit { 
            background: var(--primary); color: white; width: 100%; 
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); margin-top: 10px;
        }
        .btn-submit:disabled { 
            background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none;
        }
        
        /* Pulse animation for enabled button */
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .btn-submit:not(:disabled) { animation: pulse-green 2s infinite; }

        /* --- GPS SECTION --- */
        .gps-wrapper { display: flex; gap: 10px; }
        .gps-wrapper .form-control { flex: 1; cursor: not-allowed; }
        
        .gps-status {
            margin-top: 12px; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; font-weight: 500;
        }
        .loading-text { color: var(--accent); }
        .success-text { color: var(--primary); }
        .error-text { color: #ef4444; }

        /* --- UPLOAD SECTION --- */
        .upload-zone {
            border: 2px dashed var(--border); border-radius: var(--radius);
            padding: 30px 20px; text-align: center; cursor: pointer;
            transition: 0.3s; background: #fafafa; position: relative; overflow: hidden;
        }
        .upload-zone:hover { border-color: var(--primary); background: #f0fdf4; }
        
        .upload-icon { font-size: 2.5rem; color: #cbd5e1; margin-bottom: 12px; transition: 0.3s; }
        .upload-zone:hover .upload-icon { color: var(--primary); transform: translateY(-5px); }
        
        .preview-container { display: none; position: relative; width: 100%; height: 250px; border-radius: 12px; overflow: hidden; margin-top: 10px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .remove-img-btn {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6);
            color: white; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; cursor: pointer; border: none;
        }

        /* --- DESKTOP --- */
        @media (min-width: 768px) {
            .container { max-width: 700px; }
        }
    </style>
</head>
<body>

    <header>
        <!-- UPDATE: Link ke Dashboard HTML -->
        <a href="dashboard.html" class="back-btn">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2>Tanam Pohon Baru</h2>
        <div style="width: 32px;"></div> <!-- Spacer untuk centering title -->
    </header>

    <div class="container">
        <form id="plant-form">
            
            <!-- NEW CARD: Detail Tanaman -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-plant"><i class="fas fa-seedling"></i></div>
                    <span class="card-title">Detail Tanaman</span>
                </div>
                <div class="input-group">
                    <label class="form-label" style="display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem;">Jenis Tanaman</label>
                    <input type="text" id="plant-name" class="form-control" placeholder="Contoh: Pohon Alpukat, Mangga, Jati" required autocomplete="off">
                    <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 6px;">
                        <i class="fas fa-info-circle"></i> Nama jenis tanaman dibutuhkan untuk sistem pelacakan perkembangan.
                    </p>
                </div>
            </div>

            <!-- GPS Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-gps"><i class="fas fa-map-marker-alt"></i></div>
                    <span class="card-title">Lokasi Penanaman</span>
                </div>
                
                <div class="gps-wrapper">
                    <input type="text" id="gps-display" class="form-control" placeholder="Menunggu lokasi..." readonly required>
                    <button type="button" id="btn-gps" class="btn btn-primary">
                        <i class="fas fa-crosshairs"></i> Ambil
                    </button>
                </div>
                <div id="gps-status" class="gps-status"></div>
                <input type="hidden" id="gps-lat">
                <input type="hidden" id="gps-lng">
            </div>

            <!-- Photo Card -->
            <div class="card">
                <div class="card-header">
                    <div class="card-icon icon-camera"><i class="fas fa-camera"></i></div>
                    <span class="card-title">Bukti Foto</span>
                </div>

                <div class="upload-zone" id="upload-area">
                    <div id="upload-placeholder">
                        <i class="fas fa-cloud-upload-alt upload-icon"></i>
                        <p style="color: var(--text-muted); font-weight: 500;">Ketuk untuk upload foto</p>
                        <p style="font-size: 0.8rem; color: #94a3b8; margin-top: 4px;">JPG atau PNG (Max 5MB)</p>
                    </div>
                </div>

                <div class="preview-container" id="preview-container">
                    <img id="img-preview" class="preview-img" alt="Preview">
                    <button type="button" id="remove-img" class="remove-img-btn">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <input type="file" id="file-input" accept="image/*" hidden>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="btn-submit" class="btn btn-submit" disabled>
                <i class="fas fa-paper-plane"></i> Ajukan Verifikasi
            </button>
        </form>
    </div>

    <!-- LOGIC -->
    <script type="module">
        import { initPlantPage } from './js/plant.js';
        
        // Initialize logic dari plant.js
        if(initPlantPage) {
            initPlantPage();
        } else {
            console.error("Module initPlantPage tidak ditemukan di js/plant.js");
        }
    </script>
</body>
</html>
