<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Tani Marketplace</title>
    
    <!-- CSS -->
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0fdf4; margin: 0; color: #333; }
        .navbar { background: #166534; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 8px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
        .price { color: #15803d; font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold; }
        .btn-pi { background: #7B2CBF; }
        .btn-buy { background: #166534; width: 100%; margin-top: 10px; }
        .hidden { display: none; }
    </style>

    <!-- Library Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 1. Script Vercel (Wajib Ada) -->
    <script>
        window.ENV = {
            SUPABASE_URL: "%VITE_SUPABASE_URL%",
            SUPABASE_KEY: "%VITE_SUPABASE_ANON_KEY%"
        };
    </script>
</head>
<body>

    <nav class="navbar">
        <div style="font-weight:bold; font-size:1.2rem;">🌱 PAK TANI</div>
        <div id="authSection">
            <button class="btn btn-pi" id="btnLogin">Login Pi</button>
        </div>
    </nav>

    <div class="container">
        <h2>Produk Pertanian</h2>
        <div id="loading">Memuat data...</div>
        <div id="productGrid" class="grid"></div>
    </div>

    <!-- 2. Logic Utama -->
    <script>
        // --- KONEKSI SUPABASE ---
        const supabase = window.supabase.createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_KEY);
        let currentUser = null;

        // --- LOAD PI SDK ---
        function loadPiSDK() {
            return new Promise(resolve => {
                if (window.Pi) { window.Pi.init({ version: "2.0", sandbox: true }); resolve(); return; }
                const script = document.createElement('script');
                script.src = "https://sdk.minepi.com/pi-sdk.js";
                script.onload = () => { window.Pi.init({ version: "2.0", sandbox: true }); resolve(); };
                document.body.appendChild(script);
            });
        }

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPiSDK();
            
            // Cek User
            const stored = localStorage.getItem('pak_tani_user');
            if (stored) {
                currentUser = JSON.parse(stored);
                updateAuth(true);
            }

            // Ambil Produk
            fetchProducts();
        });

        // --- FUNGSI AMBIL PRODUK ---
        async function fetchProducts() {
            const { data, error } = await supabase.from('products').select('*').limit(10);
            const container = document.getElementById('productGrid');
            const loading = document.getElementById('loading');

            loading.classList.add('hidden');

            if (error) {
                container.innerHTML = `<p style="color:red">Gagal ambil data: ${error.message}</p>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="card">
                    <img src="${p.image_url || 'https://picsum.photos/200'}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <div class="price">Rp ${p.price}</div>
                    <button class="btn btn-buy" onclick="alert('Beli ${p.name}')">Beli</button>
                </div>
            `).join('');
        }

        // --- FUNGSI LOGIN ---
        async function login() {
            try {
                const res = await window.Pi.authenticate();
                currentUser = res.user;
                localStorage.setItem('pak_tani_user', JSON.stringify(currentUser));
                updateAuth(true);
                alert("Login Berhasil!");
            } catch (e) { alert("Login Gagal"); }
        }

        // --- UPDATE UI ---
        function updateAuth(isLoggedIn) {
            const sec = document.getElementById('authSection');
            if (isLoggedIn) {
                sec.innerHTML = `<span>Halo ${currentUser.username}</span> <button class="btn" style="background:#555" onclick="location.reload()">Keluar</button>`;
            } else {
                sec.innerHTML = `<button class="btn btn-pi" onclick="login()">Login Pi</button>`;
            }
        }

        document.getElementById('btnLogin').onclick = login;
    </script>
</body>
</html>
