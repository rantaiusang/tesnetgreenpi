<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak Tani DApp</title>
    
    <!-- CSS Styling -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 60px; }
        .navbar { background: #2E7D32; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .brand { font-weight: bold; font-size: 1.2rem; }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        .price { color: #2E7D32; font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; }
        .btn-pi { background: #7B2CBF; }
        .btn-buy { background: #2E7D32; width: 100%; margin-top: 10px; }
        .btn-logout { background: #555; }
        .hidden { display: none; }
        #loading { text-align: center; margin-top: 50px; font-size: 1.2rem; }
    </style>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Script Injeksi Vercel -->
    <script>
        window.ENV = {
            SUPABASE_URL: "%VITE_SUPABASE_URL%",
            SUPABASE_KEY: "%VITE_SUPABASE_ANON_KEY%"
        };
    </script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="brand"><i class="fa-solid fa-leaf"></i> PAK TANI</div>
        <div id="authSection">
            <button class="btn btn-pi" id="btnLogin">Login Pi</button>
        </div>
    </nav>

    <!-- Loading -->
    <div id="loading">Memuat Pasar...</div>

    <!-- Content -->
    <div id="app" class="container hidden">
        <h2 style="margin-bottom: 20px; color: #333;">Katalog Produk Segar</h2>
        <div id="productList" class="grid"></div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // 1. SETUP SUPABASE
        const supabaseUrl = window.ENV.SUPABASE_URL;
        const supabaseKey = window.ENV.SUPABASE_KEY;
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // 2. STATE
        let currentUser = null;

        // 3. LOAD PI SDK
        function loadPiSDK() {
            return new Promise((resolve) => {
                if (window.Pi) { window.Pi.init({ version: "2.0", sandbox: true }); resolve(); return; }
                const script = document.createElement('script');
                script.src = "https://sdk.minepi.com/pi-sdk.js";
                script.onload = () => { window.Pi.init({ version: "2.0", sandbox: true }); resolve(); };
                document.body.appendChild(script);
            });
        }

        // 4. INIT APP
        document.addEventListener('DOMContentLoaded', async () => {
            await loadPiSDK();

            // Cek Session
            const storedUser = localStorage.getItem('pak_tani_user');
            if (storedUser) {
                currentUser = JSON.parse(storedUser);
                updateAuthUI(true);
            }

            // Fetch Produk
            fetchProducts();
        });

        // 5. FETCH PRODUCTS
        async function fetchProducts() {
            const container = document.getElementById('productList');
            const loading = document.getElementById('loading');

            try {
                // Mengambil data dari tabel 'products'
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .limit(10);

                loading.classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');

                if (error) throw error;

                if (data.length === 0) {
                    container.innerHTML = "<p>Belum ada produk di database.</p>";
                    return;
                }

                // Render Produk
                container.innerHTML = data.map(p => `
                    <div class="card">
                        <img src="${p.image_url || 'https://picsum.photos/300'}" alt="${p.name}">
                        <div class="card-body">
                            <h3>${p.name}</h3>
                            <div class="price">Rp ${p.price}</div>
                            <small>${p.description || 'Hasil pertanian segar'}</small>
                            <button class="btn btn-buy" onclick="handleBuy(${p.id}, '${p.name}')">Beli Sekarang</button>
                        </div>
                    </div>
                `).join('');

            } catch (err) {
                console.error(err);
                loading.innerText = "Gagal memuat produk.";
            }
        }

        // 6. LOGIN PI
        async function handleLogin() {
            if (!window.Pi) return alert("Pi SDK belum siap");
            try {
                const result = await window.Pi.authenticate();
                currentUser = result.user;
                localStorage.setItem('pak_tani_user', JSON.stringify(currentUser));
                updateAuthUI(true);
                alert(`Login Berhasil! Halo ${currentUser.username}`);
            } catch (err) {
                alert("Login gagal atau dibatalkan.");
            }
        }

        // 7. BELI PRODUK (SIMPULASI)
        window.handleBuy = function(id, name) {
            if (!currentUser) {
                alert("Anda harus login dengan Pi Network dulu!");
                return;
            }
            alert(`Fitur Beli: ${name} (ID: ${id})\n\nTransaksi akan diproses via Pi Payment...`);
        };

        // 8. LOGOUT
        function handleLogout() {
            localStorage.removeItem('pak_tani_user');
            currentUser = null;
            updateAuthUI(false);
            location.reload();
        }

        function updateAuthUI(isLoggedIn) {
            const section = document.getElementById('authSection');
            if (isLoggedIn) {
                section.innerHTML = `<span>Halo, ${currentUser.username}</span> <button class="btn btn-logout" onclick="handleLogout()">Keluar</button>`;
            } else {
                section.innerHTML = `<button class="btn btn-pi" onclick="handleLogin()">Login Pi</button>`;
            }
        }

        // Setup Event Listener Tombol Login Awal
        document.getElementById('btnLogin').onclick = handleLogin;
    </script>
</body>
</html>
